<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSTYPE • login/signup (validation required)</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, rgba(255,107,43,0.15) 0%, #0a0a0a 70%);
      z-index: -1;
      animation: bgPulse 8s infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    /* back to home button */
    .back-home {
      position: fixed;
      top: 25px;
      left: 25px;
      background: #ff6b2b;
      color: #0a0a0a;
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      text-decoration: none;
      font-weight: 700;
      border: 2px solid white;
      z-index: 100;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 20px -5px #ff6b2b;
    }
    .back-home:hover {
      background: white;
      color: #ff6b2b;
      border-color: #ff6b2b;
      transform: translateY(-3px);
    }

    .book-container {
      max-width: 1100px;
      width: 100%;
      perspective: 2000px;
      margin: 3rem auto;
    }

    .book {
      position: relative;
      width: 100%;
      min-height: 650px;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
    }

    .page {
      position: absolute;
      width: 100%;
      min-height: 650px;
      backface-visibility: hidden;
      border-radius: 50px;
      overflow: hidden;
      background: #121212;
      border: 2px solid #ff6b2b;
      box-shadow: 0 30px 60px -15px rgba(255,107,43,0.4);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .page.login {
      transform: rotateY(0deg);
    }

    .page.signup {
      transform: rotateY(180deg);
    }

    .book.flipped {
      transform: rotateY(180deg);
    }

    .image-side {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      text-align: center;
      border-right: 2px solid #ff6b2b;
    }
    .image-side img {
      width: 85%;
      max-width: 280px;
      border-radius: 40px;
      margin-bottom: 2rem;
      border: 4px solid #ff6b2b;
      box-shadow: 0 20px 30px -10px #ff6b2b;
    }
    .image-side h2 {
      font-size: 2rem;
      color: white;
      margin-bottom: 1rem;
    }
    .image-side h2 span {
      color: #ff6b2b;
    }
    .image-side p {
      color: #aaa;
      line-height: 1.6;
    }

    .form-side {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .form-side h3 {
      font-size: 2rem;
      color: white;
      margin-bottom: 0.5rem;
    }
    .form-side h3 i {
      color: #ff6b2b;
      margin-right: 10px;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      color: #ff6b2b;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff6b2b;
      font-size: 1.1rem;
    }
    .form-control {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 50px;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: #ff6b2b;
      box-shadow: 0 0 15px rgba(255,107,43,0.3);
    }

    .btn-submit {
      width: 100%;
      background: #ff6b2b;
      color: #0a0a0a;
      border: none;
      padding: 1rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      border: 2px solid white;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 1.5rem 0 1rem;
      text-decoration: none;
    }
    .btn-submit:hover:not(:disabled) {
      background: white;
      color: #ff6b2b;
      border-color: #ff6b2b;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #666;
      border-color: #666;
    }

    .toggle-link {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }
    .toggle-link a {
      color: #ff6b2b;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      margin-left: 5px;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }
    .social-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #ff6b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff6b2b;
      text-decoration: none;
      transition: 0.2s;
    }
    .social-icon:hover {
      background: #ff6b2b;
      color: #0a0a0a;
      transform: translateY(-5px);
    }

    .validation-message {
      color: #ff6b2b;
      font-size: 0.75rem;
      margin-top: 0.3rem;
      display: none;
    }
    .validation-message.show {
      display: block;
    }

    @media (max-width: 800px) {
      .page {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .image-side {
        border-right: none;
        border-bottom: 2px solid #ff6b2b;
        padding: 2rem;
      }
      .image-side img {
        max-width: 200px;
      }
      .back-home {
        top: 15px;
        left: 15px;
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 500px) {
      .form-side {
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <a href="home.html" class="back-home"><i class="fas fa-home"></i> back to home</a>

  <div class="book-container">
    <div class="book" id="book">

      <!-- LOGIN PAGE -->
      <div class="page login">
        <div class="image-side">
          <img src="socialmedia1.webp" alt="login">
          <h2>welcome <span>back</span></h2>
          <p>Log in to continue your creative journey with Stackly.</p>
        </div>
        <div class="form-side">
          <h3><i class="fas fa-sign-in-alt"></i> login</h3>
          <div class="subtitle">access your account</div>

          <div class="form-group">
            <label><i class="fas fa-envelope"></i> email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-control" placeholder="your@email.com" id="loginEmail" oninput="validateLogin()">
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-control" placeholder="••••••••" id="loginPassword" oninput="validateLogin()">
            </div>
          </div>

          <button class="btn-submit" id="loginBtn" disabled onclick="handleLogin()"><i class="fas fa-arrow-right"></i> log in</button>

          <div class="toggle-link">
            don't have an account?
            <a onclick="flipBook()">sign up here</a>
          </div>

          <div class="social-login">
            <a href="4041.html" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="4041.html" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="4041.html" class="social-icon"><i class="fab fa-instagram"></i></a>
          </div>
        </div>
      </div>

      <!-- SIGNUP PAGE -->
      <div class="page signup">
        <div class="image-side">
          <img src="login.webp" alt="signup">
          <h2>join <span>instype</span></h2>
          <p>Create your account and start sharing reels today.</p>
        </div>
        <div class="form-side">
          <h3><i class="fas fa-user-plus"></i> sign up</h3>
          <div class="subtitle">become a creator</div>

          <div class="form-group">
            <label><i class="fas fa-user"></i> full name (letters only)</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-control" placeholder="John Doe" id="signupName" onkeypress="return /[A-Za-z ]/.test(String.fromCharCode(event.which))" oninput="validateSignup()">
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-phone"></i> phone (10 digits only)</label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input type="number" class="form-control" placeholder="9876543210" id="signupPhone" oninput="this.value=this.value.slice(0,10); validateSignup()">
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-envelope"></i> email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-control" placeholder="your@email.com" id="signupEmail" oninput="validateSignup()">
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-control" placeholder="••••••••" id="signupPassword" oninput="validateSignup()">
            </div>
          </div>

          <button class="btn-submit" id="signupBtn" disabled onclick="handleSignup()"><i class="fas fa-user-check"></i> create account</button>

          <div class="toggle-link">
            already have an account?
            <a onclick="flipBook()">log in here</a>
          </div>

          <div class="social-login">
            <a href="4041.html" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="4041.html" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="4041.html" class="social-icon"><i class="fab fa-instagram"></i></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Flip book function
    function flipBook() {
      document.getElementById('book').classList.toggle('flipped');
    }

    // Login validation
    function validateLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const loginBtn = document.getElementById('loginBtn');
      
      if (email !== '' && password !== '') {
        loginBtn.disabled = false;
      } else {
        loginBtn.disabled = true;
      }
    }

    // Signup validation
    function validateSignup() {
      const name = document.getElementById('signupName').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const signupBtn = document.getElementById('signupBtn');
      
      // Phone must be exactly 10 digits
      const phoneValid = phone.length === 10 && /^\d+$/.test(phone);
      
      if (name !== '' && phoneValid && email !== '' && password !== '') {
        signupBtn.disabled = false;
      } else {
        signupBtn.disabled = true;
      }
    }

    // Handle login click
    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      
      if (email && password) {
        window.location.href = '4041.html';
      }
    }

    // Handle signup click
    function handleSignup() {
      const name = document.getElementById('signupName').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      
      const phoneValid = phone.length === 10 && /^\d+$/.test(phone);
      
      if (name && phoneValid && email && password) {
        window.location.href = '404.html';
      }
    }

    // Name field validation (letters only)
    document.getElementById('signupName')?.addEventListener('keypress', function(e) {
      const char = String.fromCharCode(e.which);
      if (!/^[A-Za-z ]$/.test(char)) {
        e.preventDefault();
      }
    });

    // Initial validation calls
    validateLogin();
    validateSignup();
  </script>
</body>
</html>
